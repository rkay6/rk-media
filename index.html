<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>REKNEM</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:#000;
color:white;
overflow-x:hidden;

}

body::before{

content:"";

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background-image:

radial-gradient(white 1px,transparent 1px);

background-size:60px 60px;

opacity:.15;

z-index:-1;

}

header{

display:flex;

justify-content:space-between;

align-items:center;

padding:30px 50px;

position:absolute;

width:100%;

top:0;

}

.logo{

font-size:34px;

font-weight:700;

letter-spacing:4px;

}

.menu{

font-size:38px;

cursor:pointer;

}

.hero{

height:100vh;

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

text-align:center;

padding:20px;

}

.wings{

font-size:130px;

opacity:.9;

margin-bottom:20px;

}

.hero h1{

font-size:120px;

letter-spacing:12px;

font-weight:700;

margin-bottom:15px;

}

.subtitle{

letter-spacing:8px;

font-size:14px;

margin-bottom:40px;

color:#ddd;

}

.button{

padding:18px 50px;

border:1px solid white;

background:none;

color:white;

text-decoration:none;

transition:.4s;

}

.button:hover{

background:white;

color:black;

}

.section{

padding:100px 10%;

}

.title{

text-align:center;

font-size:40px;

letter-spacing:8px;

margin-bottom:60px;

}

.socials{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(220px,1fr));

gap:25px;

}

.card{

border:1px solid #222;

padding:40px;

text-align:center;

background:#090909;

transition:.3s;

}

.card:hover{

border-color:white;

transform:translateY(-5px);

}

.icon{

font-size:45px;

margin-bottom:20px;

}

footer{

padding:40px;

text-align:center;

border-top:1px solid #111;

color:#777;

}

@media(max-width:768px){

.hero h1{

font-size:60px;

}

.wings{

font-size:70px;

}

.logo{

font-size:26px;

}

}

</style>

</head>

<body>

<header>

<div class="logo">

REKNEM

</div>

<div class="menu">

☰

</div>

</header>

<section class="hero">

<div class="wings">

🪽 REKNEM 🪽

</div>

<h1>

REKNEM

</h1>

<p class="subtitle">

CREATE • INSPIRE • ELEVATE

</p>

<a class="button">

EXPLORE

</a>

</section>

<section class="section">

<h2 class="title">

SOCIALS

</h2>

<div class="socials">

<div class="card">

<div class="icon">

🎮

</div>

<h3>

Discord

</h3>

</div>

<div class="card">

<div class="icon">

📸

</div>

<h3>

Instagram

</h3>

</div>

<div class="card">

<div class="icon">

🎵

</div>

<h3>

TikTok

</h3>

</div>

<div class="card">

<div class="icon">

🟥

</div>

<h3>

Roblox

</h3>

</div>

</div>

</section>

<footer>

© 2026 REKNEM

</footer>

</body>

</html>
