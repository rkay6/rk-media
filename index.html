<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RK Media</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
scroll-behavior:smooth;
}

body{

background:#050505;
color:white;

background-image:
radial-gradient(circle at top left,#5B21B630,transparent 40%),
radial-gradient(circle at bottom right,#8B5CF620,transparent 40%);

}

header{

display:flex;
justify-content:space-between;
align-items:center;

padding:25px 8%;

background:rgba(0,0,0,.85);

backdrop-filter:blur(15px);

border-bottom:1px solid #5B21B6;

position:sticky;

top:0;

z-index:999;

}

.logo{

font-size:32px;

font-weight:bold;

letter-spacing:1px;

}

.logo span{

color:#8B5CF6;

}

nav a{

text-decoration:none;

color:white;

margin-left:30px;

transition:.3s;

font-size:15px;

}

nav a:hover{

color:#8B5CF6;

}

.hero{

min-height:100vh;

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

text-align:center;

padding:40px;

}

.crown{

font-size:60px;

margin-bottom:10px;

}

.hero h1{

font-size:70px;

margin-bottom:10px;

}

.hero p{

color:#bdbdbd;

font-size:18px;

max-width:600px;

line-height:1.7;

margin-bottom:40px;

}

.btns{

display:flex;

gap:15px;

flex-wrap:wrap;

justify-content:center;

}

.btn{

padding:15px 28px;

border-radius:12px;

background:#5B21B6;

color:white;

text-decoration:none;

transition:.3s;

}

.btn:hover{

background:#8B5CF6;

transform:translateY(-3px);

}

section{

padding:100px 8%;

}

.title{

font-size:42px;

color:#8B5CF6;

margin-bottom:30px;

}

.card{

background:#111;

padding:35px;

border-radius:20px;

border:1px solid #5B21B6;

margin-top:20px;

}

.socials{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(150px,1fr));

gap:20px;

}

.social{

padding:18px;

text-align:center;

border-radius:12px;

text-decoration:none;

background:#141414;

border:1px solid #5B21B6;

color:white;

transition:.3s;

}

.social:hover{

background:#5B21B6;

}

footer{

text-align:center;

padding:30px;

border-top:1px solid #5B21B6;

color:#777;

}

@media(max-width:800px){

.hero h1{

font-size:50px;

}

nav{

display:none;

}

}

</style>

</head>

<body>

<header>

<div class="logo">

👑 <span>RK</span> Media

</div>

<nav>

<a href="#home">Home</a>

<a href="#media">Media</a>

<a href="#shop">Shop</a>

<a href="#socials">Socials</a>

</nav>

</header>

<section class="hero" id="home">

<div class="crown">

👑

</div>

<h1>RK Media</h1>

<p>

Creative Content • Editing • Branding • Community

</p>

<div class="btns">

<a class="btn" href="#media">

Media

</a>

<a class="btn" href="#shop">

Shop

</a>

</div>

</section>

<section id="media">

<h2 class="title">

Media

</h2>

<div class="card">

<p>

Upload your edits, photos, videos and projects here.

</p>

</div>

</section>

<section id="shop">

<h2 class="title">

Shop

</h2>

<div class="card">

<p>

Merchandise and digital products coming soon.

</p>

</div>

</section>

<section id="socials">

<h2 class="title">

Socials

</h2>

<div class="socials">

<a class="social" href="#">

Discord</a>

<a class="social" href="#">

Instagram</a>

<a class="social" href="#">

TikTok</a>

<a class="social" href="#">

Roblox</a>

</div>

</section>

<footer>

© 2026 RK Media

</footer>

</body>

</html>
